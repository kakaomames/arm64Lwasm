name: linux-Wasm

on:
  workflow_dispatch: # ボタン一発で手動起動！

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # コミットを書き戻すために必要！
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 偵察兵（Node.js環境のセットアップ）
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 補給部隊（pnpmのインストールとキャッシュ設定）
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Start!!
        run: |
          echo ".../arm64Lwasm/ $ ls -F ./"
          ls -F ./ 
          # 1. 依存関係を綺麗に叩き込む！
          echo ".../arm64Lwasm/ $ pnpm install"
          pnpm install
          # 2. 開発用サーバーを起動する！
          echo ".../arm64Lwasm/ $ pnpm run dev"
          pnpm run dev

      - name: Auto-commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 変更がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || (git commit -m "build: auto-compile minecraft web edition" && git push)
